<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  /* =============================================
     CSS VARIABLES & RESET
  ============================================= */
  :root {
    --bg:       #0e0c0b;
    --surface:  #1a1714;
    --card-bg:  #1e1b18;
    --cream:    #f0e8dc;
    --blush:    #d4a0a0;
    --gold:     #c9a96e;
    --muted:    #7a6e65;
    --border:   rgba(201,169,110,0.18);
    --glow:     rgba(201,169,110,0.25);
    --font-h:   'Playfair Display', Georgia, serif;
    --font-b:   'Cormorant Garamond', Georgia, serif;
    --trans:    0.6s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font-b);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* =============================================
     SECTION 1 — OPENING SLIDESHOW
  ============================================= */
  #slideshow {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.4s ease;
  }

  #slideshow.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
    overflow: hidden;
  }

  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.08);
    animation: none;
  }

  .slide.active img {
    animation: kenburns 7s ease forwards;
  }

  @keyframes kenburns {
    from { transform: scale(1.08) translate(0,0); }
    to   { transform: scale(1.0) translate(-1%,-0.5%); }
  }

  /* dark vignette over slides */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.72) 100%);
  }

  /* Per-slide caption overlay */
  #slide-caption {
    position: absolute;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    padding: 1.5rem;
    width: 100%;
    max-width: 700px;
  }

  #slide-caption .slide-heading {
    font-family: var(--font-h);
    font-size: clamp(2rem, 6vw, 4.6rem);
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--cream);
    text-shadow: 0 2px 40px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s ease 0.4s, transform 0.9s ease 0.4s;
    line-height: 1.2;
  }

  #slide-caption .slide-sub {
    font-family: var(--font-b);
    font-style: italic;
    font-size: clamp(1rem, 2.4vw, 1.35rem);
    color: var(--gold);
    letter-spacing: 0.18em;
    margin-top: 0.8rem;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.9s ease 0.75s, transform 0.9s ease 0.75s;
  }

  #slide-caption.caption-visible .slide-heading,
  #slide-caption.caption-visible .slide-sub {
    opacity: 1;
    transform: translateY(0);
  }

  #slide-caption.caption-exit .slide-heading,
  #slide-caption.caption-exit .slide-sub {
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Progress dots */
  #slide-dots {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 0.5rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s, transform 0.4s;
  }

  .dot.active {
    background: var(--gold);
    transform: scale(1.4);
  }

  /* =============================================
     SECTION 2 — MEMORY HUB
     Desktop: CSS grid named-areas, 3×3, centre cell
     holds the title; the 5 cards fill corner / edge
     cells. No JS math → no overlaps.
  ============================================= */
  #hub {
    min-height: 100vh;
    padding: 4rem 2rem 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 1.4s ease 0.2s;
  }

  #hub.visible { opacity: 1; }

  /* ── Stage: 3-column × 3-row grid ── */
  .hub-stage {
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    grid-template-rows: auto auto auto;
    grid-template-areas:
      "c1  .   c2"
      ".   mid  ."
      "c3  .   c4";
    gap: 2rem 2.4rem;
    align-items: center;
    justify-items: center;
    width: min(960px, 94vw);
    margin: 0 auto;
    position: relative;
  }

  /* fifth card sits below the grid as a centred singleton */
  .hub-stage::after {
    content: '';
    display: none; /* purely for decoration if needed */
  }

  /* ── Centre title ── */
  .hub-centre {
    grid-area: mid;
    text-align: center;
    z-index: 2;
    padding: 1.4rem 1rem;
    /* soft radial glow */
    background: radial-gradient(ellipse at center, rgba(201,169,110,0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hub-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
    margin-bottom: 0.6rem;
  }

  .hub-title {
    font-family: var(--font-h);
    font-size: clamp(1.7rem, 3.6vw, 3rem);
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.06em;
    line-height: 1.15;
  }

  .hub-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0.9rem auto 0;
    opacity: 0.4;
  }

  /* ── Cards container — lays cards into named grid areas ── */
  #cards-container {
    display: contents; /* cards participate directly in hub-stage grid */
  }

  /* Assign each card to a grid area by nth-child */
  .memory-card:nth-child(1) { grid-area: c1; }
  .memory-card:nth-child(2) { grid-area: c2; }
  .memory-card:nth-child(3) { grid-area: c3; }
  .memory-card:nth-child(4) { grid-area: c4; }
  /* Card 5: centred below, spans nothing — injected after grid via flex row */
  .memory-card:nth-child(5) {
    grid-column: 1 / -1;
    justify-self: center;
  }

  .memory-card {
    position: relative;
    width: clamp(145px, 17vw, 210px);
    aspect-ratio: 3/4;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    background: var(--card-bg);
    transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* Hover: subtle lift only — no scale that causes collision */
  .memory-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px var(--gold);
    border-color: var(--gold);
    z-index: 5;
  }

  .card-thumb {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s ease;
    filter: brightness(0.52);
  }

  .memory-card:hover .card-thumb {
    transform: scale(1.06);
    filter: brightness(0.65);
  }

  .card-info {
    position: relative;
    z-index: 2;
    padding: 1.2rem 1rem 1rem;
    background: linear-gradient(transparent, rgba(10,8,7,0.94) 55%);
  }

  .card-number {
    font-size: 0.6rem;
    letter-spacing: 0.38em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }

  .card-title {
    font-family: var(--font-h);
    font-size: clamp(0.72rem, 1.4vw, 0.9rem);
    font-weight: 400;
    font-style: normal;
    color: var(--cream);
    line-height: 1.35;
  }

  .card-cta {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 0.5rem;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .card-cta::after {
    content: '→';
    font-size: 0.85rem;
    transition: transform 0.3s;
  }

  .memory-card:hover .card-cta::after {
    transform: translateX(4px);
  }

  /* =============================================
     GALLERY MODAL
  ============================================= */
  #gallery-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(8,7,6,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #gallery-modal.open {
    opacity: 1;
    pointer-events: all;
  }

  .gallery-inner {
    width: 100%;
    max-width: 900px;
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
  }

  /* Close + header */
  .gallery-top {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .gallery-chapter {
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.75;
  }

  #gallery-title {
    font-family: var(--font-h);
    font-style: italic;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    color: var(--cream);
    text-align: center;
    flex: 1;
    padding: 0 1rem;
  }

  #close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #close-btn:hover { color: var(--cream); border-color: var(--gold); }

  /* Image frame */
  .gallery-frame {
    width: 100%;
    max-height: 52vh;
    position: relative;
    border-radius: 3px;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gallery-img {
    max-width: 100%;
    max-height: 52vh;
    object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 0.7s ease;
  }

  #gallery-img.visible { opacity: 1; }

  /* Caption */
  #gallery-caption {
    font-family: var(--font-b);
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-style: italic;
    color: var(--cream);
    text-align: center;
    line-height: 1.7;
    max-width: 640px;
    min-height: 2.6em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }

  #gallery-caption.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Step counter */
  #step-counter {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    color: var(--muted);
  }

  /* Nav controls */
  .gallery-nav {
    display: flex;
    align-items: center;
    gap: 1.4rem;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 0.55rem 1.4rem;
    font-family: var(--font-b);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }

  .nav-btn:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .nav-btn:disabled:hover {
    background: none;
    border-color: var(--border);
    color: var(--cream);
  }

  /* Step dots */
  .step-dots {
    display: flex;
    gap: 0.45rem;
  }

  .step-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, transform 0.3s;
  }

  .step-dot.active {
    background: var(--gold);
    transform: scale(1.5);
  }

  /* Mandarin aesthetic hint for Memory 4 */
  .memory-card[data-memory="4"] .card-title {
    letter-spacing: 0.08em;
  }

  #gallery-modal[data-memory="4"] #gallery-title::after {
    content: ' 中国';
    font-size: 0.75em;
    color: var(--gold);
    opacity: 0.6;
    margin-left: 0.4em;
  }

  /* =============================================
     RESPONSIVE
  ============================================= */
  @media (max-width: 700px) {
    .hub-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .hub-centre {
      background: none;
      padding: 0 1rem;
      margin-bottom: 2rem;
      border-radius: 0;
    }

    /* Override display:contents so it acts as a real grid container */
    #cards-container {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .memory-card {
      position: relative !important;
      width: 100% !important;
      grid-area: unset !important;
      grid-column: unset !important;
    }

    .memory-card:nth-child(5) {
      grid-column: 1 / -1 !important;
      width: 50% !important;
      margin: 0 auto;
    }

    .gallery-frame { max-height: 42vh; }
    #gallery-img   { max-height: 42vh; }
    .nav-btn       { padding: 0.5rem 1rem; font-size: 0.78rem; }
  }
</style>
</head>

  const dotsEl     = document.getElementById('slide-dots');
  const captionEl  = document.getElementById('slide-caption');
  const headingEl  = captionEl.querySelector('.slide-heading');
  const subEl      = captionEl.querySelector('.slide-sub');
  const DURATION   = 5200; // ms per slide
  let current      = 0;
  let timer;

  // Build dots
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  function showCaption(slide) {
    captionEl.classList.remove('caption-visible', 'caption-exit');
    headingEl.textContent = slide.dataset.heading || '';
    subEl.textContent     = slide.dataset.sub || '';
    // Trigger reflow then animate in
    void captionEl.offsetWidth;
    captionEl.classList.add('caption-visible');
  }

  function hideCaption(cb) {
    captionEl.classList.remove('caption-visible');
    captionEl.classList.add('caption-exit');
    setTimeout(cb, 520);
  }

  function goTo(n) {
    slides[current].classList.remove('active');
    dotsEl.children[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    dotsEl.children[current].classList.add('active');
    showCaption(slides[current]);
  }

  function next() {
    if (current < slides.length - 1) {
      hideCaption(() => goTo(current + 1));
    } else {
      clearInterval(timer);
      hideCaption(endSlideshow);
    }
  }

  function endSlideshow() {
    const ss  = document.getElementById('slideshow');
    const hub = document.getElementById('hub');
    ss.classList.add('hidden');
    hub.classList.add('visible');
    setTimeout(() => { ss.style.display = 'none'; }, 1600);
  }

  // Show first caption
  showCaption(slides[0]);
  timer = setInterval(next, DURATION);
})();


/* ================================================
   MEMORY HUB — build cards
   Layout is handled by CSS grid (no JS positioning).
================================================ */
const container = document.getElementById('cards-container');

memories.forEach((mem, i) => {
  const card = document.createElement('div');
  card.className = 'memory-card';
  card.dataset.memory = i + 1;
  card.innerHTML = `
    <img class="card-thumb" src="${mem.thumbnail}" alt="${mem.title}" loading="lazy" />
    <div class="card-info">
      <div class="card-number">Chapter ${String(i + 1).padStart(2, '0')}</div>
      <div class="card-title">${mem.title}</div>
      <div class="card-cta">Open memory</div>
    </div>
  `;
  card.addEventListener('click', () => openGallery(i));
  container.appendChild(card);
});


/* ================================================
   GALLERY MODAL LOGIC
================================================ */
const modal       = document.getElementById('gallery-modal');
const titleEl     = document.getElementById('gallery-title');
const chapterEl   = document.getElementById('gallery-chapter');
const imgEl       = document.getElementById('gallery-img');
const captionEl   = document.getElementById('gallery-caption');
const stepDotsEl  = document.getElementById('step-dots');
const counterEl   = document.getElementById('step-counter');
const prevBtn     = document.getElementById('prev-btn');
const nextBtn     = document.getElementById('next-btn');
const closeBtn    = document.getElementById('close-btn');

let currentMemory = null;
let currentStep   = 0;

function openGallery(memIndex) {
  currentMemory = memIndex;
  currentStep   = 0;
  const mem     = memories[memIndex];

  chapterEl.textContent = `Chapter ${String(memIndex + 1).padStart(2, '0')}`;
  titleEl.textContent   = mem.title;

  // Mandarin aesthetic toggle
  if (mem.mandarin) {
    modal.dataset.memory = 4;
  } else {
    delete modal.dataset.memory;
  }

  // Build step dots
  stepDotsEl.innerHTML = '';
  mem.steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === 0 ? ' active' : '');
    stepDotsEl.appendChild(d);
  });

  modal.classList.add('open');
  renderStep();
}

function renderStep() {
  const mem  = memories[currentMemory];
  const step = mem.steps[currentStep];
  const total = mem.steps.length;

  // Fade out
  imgEl.classList.remove('visible');
  captionEl.classList.remove('visible');

  setTimeout(() => {
    imgEl.src = step.img;
    imgEl.onload = () => { imgEl.classList.add('visible'); };
    // Fallback in case already cached
    if (imgEl.complete) imgEl.classList.add('visible');

    captionEl.textContent = step.line;
    setTimeout(() => captionEl.classList.add('visible'), 80);

    counterEl.textContent = `${currentStep + 1} / ${total}`;

    // Dots
    Array.from(stepDotsEl.children).forEach((d, i) => {
      d.classList.toggle('active', i === currentStep);
    });

    prevBtn.disabled = currentStep === 0;
    nextBtn.disabled = currentStep === total - 1;
    nextBtn.textContent = currentStep === total - 1 ? 'The end ♡' : 'Next →';

  }, 220);
}

prevBtn.addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; renderStep(); }
});

nextBtn.addEventListener('click', () => {
  const total = memories[currentMemory].steps.length;
  if (currentStep < total - 1) { currentStep++; renderStep(); }
});

closeBtn.addEventListener('click', closeGallery);

modal.addEventListener('click', (e) => {
  if (e.target === modal) closeGallery();
});

function closeGallery() {
  modal.classList.remove('open');
  imgEl.classList.remove('visible');
  captionEl.classList.remove('visible');
  setTimeout(() => { imgEl.src = ''; }, 600);
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextBtn.click();
  if (e.key === 'ArrowLeft')  prevBtn.click();
  if (e.key === 'Escape')     closeGallery();
});
</script>
